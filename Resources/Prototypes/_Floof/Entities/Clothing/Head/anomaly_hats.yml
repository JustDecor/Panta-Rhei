- type: entity
  parent: ClothingHeadBase
  id: anomalyhatfloral # floral
  name: floral anomaly hat
  description: Now why on earth would you turn an anomaly core into a hat!? Well science thats why.
  components:
  - type: Sprite
    sprite: Structures/Specific/Anomalies/inner_anom_layer.rsi
    layers:
    - state: flora
      shader: unshaded
  - type: Clothing
    slots: [head]
    sprite: Structures/Specific/Anomalies/inner_anom_layer.rsi
    clothingVisuals:
      head:
      - state: flora
        shader: unshaded
  - type: Tag
    tags:
    - ClothMade
    - HamsterWearable
  - type: Construction
    graph: AnomalyHat
    node: start

