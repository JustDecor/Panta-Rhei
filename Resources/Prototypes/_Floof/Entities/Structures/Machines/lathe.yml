- type: entity
  parent: BaseLathe
  id: PrizeCounter
  name: prize counter
  description: Claim your prize and win some toys and cute plushies!
  components:
  - type: AmbientOnPowered
  - type: AmbientSound
    volume: -9
    range: 3
    enabled: false
    sound:
      path: /Audio/Ambience/Objects/vending_machine_hum.ogg
  - type: LitOnPowered
  - type: ApcPowerReceiver
    powerLoad: 600
  - type: Vocalizer
    minVocalizeInterval: 1m
    maxVocalizeInterval: 5m
    hideChat: true
  - type: DatasetVocalizer
    dataset: PrizeCounterAdvertisements
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#4b93ad"
  - type: Transform
    noRot: false
  - type: Sprite
    sprite: _Floof/Structures/Machines/prizecounter.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Lathe
    idleState: icon
    runningState: icon
    staticPacks:
    - PrizesStatic

- type: entity
  parent: BaseLathe
  id: CasinoPrizeVendor
  name: casino prize counter
  description: Claim your winning! Or.... risk it all...
  components:
  - type: AmbientOnPowered
  - type: AmbientSound
    volume: -9
    range: 3
    enabled: false
    sound:
      path: /Audio/Ambience/Objects/vending_machine_hum.ogg
  - type: LitOnPowered
  - type: ApcPowerReceiver
    powerLoad: 600
  - type: Vocalizer
    minVocalizeInterval: 1m
    maxVocalizeInterval: 5m
    hideChat: true
  - type: DatasetVocalizer
    dataset: PrizeCounterAdvertisements # need to change
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#4b93ad"
  - type: Transform
    noRot: false
  - type: Sprite
    sprite: _Floof/Objects/Misc/Casino/casino_prize_machine.rsi # need to change
    snapCardinals: true
    layers:
    - state: casino_prize_dispenser-off
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: casino_prize_dispenser
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: casino_prize_dispenser-panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Lathe
    idleState: casino_prize_dispenser-off
    runningState: casino_prize_dispenser
    staticPacks:
    - CasinoPrizes # casino prizes
