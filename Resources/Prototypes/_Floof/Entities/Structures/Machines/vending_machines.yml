- type: entity
  parent: VendingMachine
  id: VendingMachineFreelancer
  name: Freelancer Vend
  description: Freelancer Vend! When you need dispense some unaffilated freedom!
  components:
  - type: VendingMachine
    pack: VMFreelancerInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    ejectState: eject-unshaded
    denyState: deny-unshaded
  - type: Sprite
    noRot: true
    sprite: _Floof/Structures/Machines/VendingMachines/freelancervend.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 2
    energy: 1.3
    color: "#ffb0b0"
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
  - type: AccessReader
    access: [["Freelancer"]]
  - type: Transform
    noRot: false
  - type: Rotatable
    rotateWhileAnchored: false

- type: entity
  parent: VendingMachine
  id: PetStoreVendingMachine
  name: Pet Store Vendor
  description: Get your supplies for those good boys and girls in your life.
  components:
  - type: Sprite
    sprite: _Floof/Structures/Machines/VendingMachines/petstore.rsi
    layers:
    - state: "unpowered-base"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "powered-unshaded"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel-open
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#4ba3ad"
  - type: VendingMachine
    pack: PetVendorInventory
    offState: unpowered-base
    brokenState: broken-base
    normalState: powered-unshaded
    denyState: deny-unshaded
  - type: Wires
    layoutId: ShopVendor
  - type: Rotatable
    rotateWhileAnchored: false
  - type: DatasetVocalizer
    dataset: PetStoreAds

- type: entity
  parent: VendingMachine
  id: VendingMachineBepis
  name: Bepis Vendor
  description: Get your nice cold can of Bepis here.
  components:
  - type: Sprite
    sprite: _Floof/Structures/Machines/VendingMachines/bepis.rsi
    layers:
    - state: "Bepis_Machine-off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "Bepis_Machine"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
    - state: Bepis_Machine-panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#4ba3ad"
  - type: VendingMachine
    pack: BepisInventory
    offState: Bepis_Machine-off
    brokenState: Bepis_Machine-broken
    normalState: Bepis_Machine
    denyState: Bepis_Machine-deny
  - type: Wires
    layoutId: ShopVendor
  - type: Rotatable
    rotateWhileAnchored: false
  - type: DatasetVocalizer
    dataset: VendingMachineBepisAds

# chip vending machine
- type: entity
  parent: VendingMachineWallmount
  id: VendingMachineWallChipDispenser
  name: Chip Dispenser
  description: Lets go gambling, winning one speso at a time.
  components:
  - type: VendingMachine
    pack: ChipDispenserInventory
    offState: chipmachine-off
    brokenState: chipmachine-broken
    normalState: chipmachine-on
    denyState: chipmachine-deny
  - type: Sprite
    sprite: _Floof/Objects/Misc/Casino/casino_chip_dispenser.rsi
    layers:
    - state: "chipmachine-off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "chipmachine-off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: chipmachine-panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.3
    energy: 3.0
    color: "#43ccb5"
