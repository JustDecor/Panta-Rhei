- type: entity
  parent: FoodBakedBase
  id: FoodBakedPeanutButterBrownieBatch
  name: peanut butter brownies
  description: A pan of peanut butter brownies.
  components:
  - type: Item
    size: Normal
    storedOffset: 0,-3
  - type: FlavorProfile
    flavors:
    - sweet
    - chocolate
    - creamy
    - nutty
  - type: Sprite
    sprite: _Floof/Objects/Consumable/Food/peanut_butter_food.rsi
    state: peanut_butter_brownie_sheet
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 78
        reagents:
        - ReagentId: Nutriment
          Quantity: 30
        - ReagentId: PeanutButter
          Quantity: 18
  - type: SliceableFood
    count: 6
    slice: FoodBakedPeanutButterBrownie

