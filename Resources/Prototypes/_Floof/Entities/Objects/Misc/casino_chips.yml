# Casino chips
- type: entity
  parent: BaseItem
  id: CasinoChip # Parent for all the other chips
  name: casino chip
  description: Lets go gambling.
  components:
  - type: Item
    shape:
    - 0,0,1,0
    storedOffset: 0,-2
  - type: Material
  - type: StaticPrice
    price: 0
  - type: Stack
    stackType: CasinoChip
    count: 1
    baseLayer: base
    layerStates:
    - spacecasinocash1
    - spacecasinocash10
    - spacecasinocash20
    - spacecasinocash50
    - spacecasinocash100
    - spacecasinocash200
    - spacecasinocash500
    - spacecasinocash1000
    layerFunction: Threshold
  - type: StackLayerThreshold
    thresholds: [10, 20, 50, 100, 500, 1000, 2500, 5000, 10000]
  - type: Sprite
    sprite: _Floof/Objects/Misc/Casino/casino_chips.rsi
    state: spacecasinocash1
    layers:
    - state: spacecasinocash1
      map: ["base"]
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        density: 30
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.2,0.25,0.1"
        mask:
        - ItemMask
  - type: Appearance
  - type: CargoSellBlacklist # Frontier
  - type: PhysicalComposition
    materialComposition:
      CasinoChips: 1
  - type: Tag
    tags:
    - Sheet
    - CasinoChips

- type: entity
  parent: CasinoChip
  id: CasinoChip1
  suffix: 1
  components:
  - type: Icon
    sprite: _Floof/Objects/Misc/Casino/casino_chips.rsi
    state: spacecasinocash1
  - type: Stack
    stackType: CasinoChip
    count: 1

