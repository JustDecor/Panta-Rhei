- type: entity
  name: Kitsune
  parent: [SimpleMobBase, StripableInventoryBase, BaseMobKitsune]
  id: MobKitsuneFox
  description: A Kitsune's fox form.
  components:
  - type: KitsuneFox
  - type: MovementSpeedModifier
    baseWalkSpeed: 4.25
    baseSprintSpeed: 5.5
  # Floofstation - fox form movement changes start
  - type: Sprite
    sprite: _Floof/Mobs/Customization/kitsune/foxform.rsi
    layers:
    - map: ["enum.KitsuneColorVisuals.Layer", "movement"] # Floofstation - handles movement
      state: fox-moving
    - map: ["enum.KitsuneColorVisuals.InnerLayer"] # Floofstation - inner layer
      state: kitsune_fox_innerear
  - type: SpriteMovement
    movementLayers: # floofstation - layer that moves the legs and tail when moving
      movement:
        state: fox-moving
    noMovementLayers: # floofstation - layer when standing still
      movement:
        state: fox
  # Floofstation - fox form movement changes end
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      200: Dead
  - type: Damageable
    damageContainer: BiologicalMetaphysical
    damageModifierSet: KitsuneFox
  - type: Inventory
    speciesId: fox
    templateId: pet
  - type: DamageStateVisuals
    states:
      Alive:
        Base: fox
      Critical:
        Base: fox_dead
      Dead:
        Base: fox_dead
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 3
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 100
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Heat: 8
  - type: Tag
    tags:
    - VimPilot
    - DoorBumpOpener
    - KitsuneEmotes # Floofstation - give kitsune fox form kitsune emotes
  - type: HTN
    rootTask:
      task: IdleCompound
  - type: MindContainer
  - type: MindExaminable
  - type: CosmicMarkVisuals
    subtleState: kitsunefox
    starState: kitsunefox
  - type: StatusIcon
    bounds: -0.5,-0.5,0.5,0.5
  - type: CosmicCenserTarget
  - type: LanguageKnowledge # Floofstation - omg fox!
    speaks:
    - TauCetiBasic
    - Kagebun
    understands:
    - TauCetiBasic
    - Kagebun
    - Nekomimetic
    naturalLanguage: Kagebun
  # Floofstation addtions start
  - type: Vocal
    sounds:
      Male: MaleKitsune
      Female: FemaleKitsune
      Unsexed: MaleKitsune
  - type: Puller # let fox form pull because funny fox move slow when dragging big thing
    needsHands: false
  - type: LeashAnchor # let fox form be leashed
    kind: Intrinsic
  - type: NightVision # night vision, this is a maybe leaving for now while people debate
    color: "#808080"
  # Floofstation additions end
